name: Android Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_NAME="mizunomi-${TAG_NAME}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"
        id: prepare_apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          APK_NAME: ${{ steps.prepare_apk.outputs.apk_name }}
        run: |
          cat > release-notes.md <<'EOF'
          mizunomi test release

          This is an alpha debug build for testing.

          Main features:
          - Water intake recording
          - Drink type summary
          - Recent records edit/delete
          - 7-day trend
          - Goal achievement feedback
          - Pace status
          - Hydration reminder notifications

          Notes:
          - This is a development build.
          - This APK is not distributed via Google Play.
          - Android may show an unknown app installation warning.
          EOF

          gh release create "${TAG_NAME}" "${APK_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file release-notes.md
